name: PipeBuilder E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline:
    name: E0 / ${{ matrix.os }} / Python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python: "3.7"
          - os: ubuntu-latest
            python: "3.14"
          - os: windows-latest
            python: "3.7"
          - os: windows-latest
            python: "3.9"
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.13"
          - os: windows-latest
            python: "3.14"
          - os: macos-latest
            python: "3.7"
          - os: macos-latest
            python: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize git line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Compile release artifact
        run: python -m py_compile pipebuilder.py
      - name: Run offline E2E
        run: python tests/e2e/run.py --tier offline --jobs 4
      - name: Print failing cases
        if: failure()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = Path("tests/e2e/e2e-report.json")
          if not report.is_file():
              print("no e2e-report.json")
              raise SystemExit(0)
          data = json.loads(report.read_text(encoding="utf-8"))
          failed = [item for item in data.get("cases", []) if item.get("status") == "fail"]
          print(f"failed cases: {len(failed)}")
          for item in failed:
              print(item["id"])
              reason = item.get("reason")
              if reason:
                  print(reason.splitlines()[-6:])
          PY
      - name: Upload E2E report and failures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.os }}-py${{ matrix.python }}
          if-no-files-found: ignore
          path: |
            tests/e2e/e2e-report.json
            tests/e2e/.artifacts/
